<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>学不死 · 登录</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    background: #ebe7e0;
    font-family: 'LXGW WenKai TC', 'PingFang SC', system-ui, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }

  /* iPhone 17 Pro · 393×852 */
  .phone {
    width: 393px; height: 852px;
    border-radius: 56px;
    background: #0a0a0a;
    padding: 12px;
    box-shadow:
      0 0 0 2px #2a2a2a inset,
      0 30px 60px -20px rgba(0,0,0,0.35),
      0 10px 25px -10px rgba(0,0,0,0.2);
    position: relative;
  }
  .screen {
    width: 100%; height: 100%;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(circle at 100% 0%, #fff 0%, transparent 45%),
      radial-gradient(circle at 0% 100%, #f5e8d8 0%, transparent 50%),
      #faf5ec;
    color: #2a1f15;
  }
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 124px; height: 37px; background: #000; border-radius: 20px;
    z-index: 100;
  }
  .status-bar {
    position: relative; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 19px 36px 0; height: 54px;
    font-family: 'SF Pro Text', -apple-system, system-ui, sans-serif;
    font-size: 16px; font-weight: 600;
    color: #2a1f15;
  }
  .status-bar .right { display:flex; gap:6px; align-items:center; }
  .status-bar svg { width: 17px; height: 11px; }
  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px;
    background: #2a1f15;
  }

  .body {
    position: absolute; inset: 54px 0 0 0;
    display: flex; flex-direction: column;
    padding: 0 28px;
  }

  /* ─── decoration: floating shapes ─── */
  .float {
    position: absolute;
    border: 1.5px solid #2a1f15;
    box-shadow: 2px 3px 0 rgba(42,31,21,0.1);
  }
  .float.sticky {
    background: #fef3c7;
    width: 60px; height: 60px;
    top: 90px; right: 22px;
    transform: rotate(8deg);
    border-radius: 4px;
    font-family: 'LXGW WenKai TC', cursive;
    font-size: 12px; color: #6a4f2a;
    padding: 8px; line-height: 1.3;
  }
  .float.book {
    background: #d4e8d0;
    width: 50px; height: 64px;
    top: 70px; left: 20px;
    transform: rotate(-6deg);
    border-radius: 4px 8px 8px 4px;
    border-left: 4px solid #2a1f15;
  }
  .float.dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #c14d2e; border: none; box-shadow: none;
  }
  .float.dot.d1 { top: 180px; right: 60px; }
  .float.dot.d2 { top: 220px; left: 80px; background: #f5d97a; border: 1.5px solid #2a1f15; }

  /* ─── hero ─── */
  .hero {
    margin-top: 80px;
    text-align: center;
    position: relative;
  }
  .logo {
    width: 96px; height: 96px;
    margin: 0 auto 18px;
    background: #f5d97a;
    border-radius: 28px;
    border: 2px solid #2a1f15;
    box-shadow: 4px 5px 0 #2a1f15;
    display: flex; align-items: center; justify-content: center;
    font-family: 'LXGW WenKai TC', cursive;
    font-weight: 700;
    font-size: 56px;
    line-height: 1;
    color: #2a1f15;
    position: relative;
    transform: rotate(-3deg);
  }
  .logo::after {
    content: '✦';
    position: absolute;
    top: -10px; right: -10px;
    color: #c14d2e; font-size: 20px;
    transform: rotate(15deg);
  }
  .title {
    font-family: 'LXGW WenKai TC', cursive;
    font-size: 36px; font-weight: 700;
    color: #2a1f15;
    letter-spacing: 1px;
    margin: 0;
    line-height: 1.1;
  }
  .subtitle {
    font-size: 15px;
    color: #6a5340;
    margin-top: 10px;
    line-height: 1.55;
    max-width: 280px;
    margin-left: auto; margin-right: auto;
  }
  .subtitle .accent {
    color: #c14d2e;
    border-bottom: 1.5px solid #c14d2e;
    padding-bottom: 1px;
  }

  /* ─── illustration: little study scene ─── */
  .scene {
    margin: 36px 0 24px;
    height: 110px;
    position: relative;
    display: flex; justify-content: center; align-items: flex-end;
    gap: 14px;
  }
  .scene .desk {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 220px; height: 4px;
    background: #2a1f15; border-radius: 2px;
  }
  .scene .item {
    position: relative;
    border: 1.5px solid #2a1f15;
    box-shadow: 2px 3px 0 rgba(42,31,21,0.12);
  }
  .scene .book2 {
    width: 70px; height: 86px;
    background: #fff;
    border-radius: 4px;
    transform: rotate(-4deg);
    margin-bottom: 4px;
    position: relative;
  }
  .scene .book2::before {
    content: '';
    position: absolute;
    inset: 12px 12px auto 12px;
    height: 2px; background: #2a1f15;
    box-shadow: 0 8px 0 #2a1f15, 0 16px 0 #2a1f15;
  }
  .scene .cup {
    width: 36px; height: 44px;
    background: #c14d2e;
    border-radius: 4px 4px 14px 14px;
    margin-bottom: 4px;
    position: relative;
  }
  .scene .cup::after {
    content: '';
    position: absolute;
    right: -10px; top: 8px;
    width: 12px; height: 16px;
    border: 1.5px solid #2a1f15;
    border-left: none;
    border-radius: 0 8px 8px 0;
  }
  .scene .cup::before {
    content: '~';
    position: absolute;
    top: -16px; left: 50%; transform: translateX(-50%);
    font-family: 'LXGW WenKai TC', cursive;
    color: #6a5340;
    font-size: 14px;
  }
  .scene .pencil {
    width: 60px; height: 8px;
    background: #f5d97a;
    border-radius: 1px;
    margin-bottom: 4px;
    transform: rotate(5deg);
    position: relative;
  }
  .scene .pencil::before {
    content: '';
    position: absolute; left: -6px; top: -1px;
    width: 0; height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-right: 8px solid #2a1f15;
  }

  /* ─── buttons ─── */
  .actions {
    margin-top: 8px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .btn {
    height: 56px;
    border-radius: 28px;
    border: 2px solid #2a1f15;
    font-family: 'LXGW WenKai TC', 'PingFang SC', sans-serif;
    font-size: 17px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
  }
  .btn-primary {
    background: #2a1f15;
    color: #faf5ec;
    box-shadow: 3px 4px 0 #c14d2e;
  }
  .btn-primary:active {
    transform: translate(3px, 4px);
    box-shadow: 0 0 0 #c14d2e;
  }
  .btn-secondary {
    background: #fff;
    color: #2a1f15;
    box-shadow: 3px 4px 0 rgba(42,31,21,0.15);
  }
  .btn-secondary:active {
    transform: translate(3px, 4px);
    box-shadow: 0 0 0 rgba(42,31,21,0.15);
  }
  .btn .icon { width: 22px; height: 22px; display: inline-flex; }

  /* ─── divider ─── */
  .divider {
    display: flex; align-items: center;
    margin: 4px 0;
    color: #8a7560;
    font-size: 13px;
    gap: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1; height: 1px;
    background: repeating-linear-gradient(90deg, #8a7560 0 4px, transparent 4px 8px);
  }

  /* ─── footer ─── */
  .footer {
    margin-top: auto;
    padding-bottom: 36px;
    text-align: center;
    font-size: 12px;
    color: #8a7560;
    line-height: 1.6;
  }
  .footer a {
    color: #c14d2e;
    text-decoration: underline;
    text-decoration-style: wavy;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    text-decoration-color: rgba(193, 77, 46, 0.5);
  }

  /* ─── form (account + password) ─── */
  .scene { display: none !important; }
  .hero { margin-top: 56px !important; }
  .actions { margin-top: 22px !important; }
  .form {
    margin-top: 28px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .field {
    height: 54px; background: #fff;
    border: 2px solid #2a1f15; border-radius: 16px;
    box-shadow: 2px 3px 0 rgba(42,31,21,0.1);
    display: flex; align-items: center; padding: 0 16px; gap: 10px;
    transition: box-shadow 0.15s;
  }
  .field:focus-within { box-shadow: 3px 4px 0 #c14d2e; }
  .field-icon {
    width: 22px; height: 22px; color: #6a5340;
    display: inline-flex; flex-shrink: 0;
  }
  .field-icon svg { width: 100%; height: 100%; }
  .field input {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: 'LXGW WenKai TC', 'PingFang SC', sans-serif;
    font-size: 16px; color: #2a1f15; padding: 0;
  }
  .field input::placeholder { color: #b8a78f; }
  .eye {
    border: none; background: transparent; cursor: pointer;
    color: #8a7560; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .eye svg { width: 22px; height: 22px; }
  .form-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 4px; margin-top: 2px; font-size: 14px;
  }
  .remember {
    display: inline-flex; align-items: center; gap: 8px;
    color: #6a5340; cursor: pointer;
  }
  .check {
    width: 18px; height: 18px;
    border: 1.5px solid #2a1f15; border-radius: 5px;
    background: #fff;
    box-shadow: 1px 2px 0 rgba(42,31,21,0.1);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .check.checked { background: #c14d2e; position: relative; }
  .check.checked::after {
    content: ''; width: 8px; height: 4px;
    border-left: 2px solid #fff; border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .link-text {
    color: #c14d2e; text-decoration: none;
    border-bottom: 1.5px dashed rgba(193, 77, 46, 0.5);
    padding-bottom: 1px;
  }
  .signup {
    text-align: center; font-size: 14px; color: #6a5340; margin-top: 14px;
  }
  .signup a {
    color: #c14d2e; text-decoration: none;
    font-weight: 600; margin-left: 4px;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">
    <div class="island"></div>
    <div class="status-bar">
      <span>9:41</span>
      <span class="right">
        <svg viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="3" width="3" height="6" rx="1"/><rect x="5" y="2" width="3" height="8" rx="1"/><rect x="10" y="1" width="3" height="10" rx="1"/></svg>
        <svg viewBox="0 0 18 12" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 9.5l-3-2c1.5-1 4.5-1 6 0l-3 2zM3 6.5c3-2 9-2 12 0M1 4.5c4-3 12-3 16 0"/></svg>
        <svg viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="currentColor" fill="none"/><rect x="22.5" y="3.5" width="1.5" height="5" rx="0.5" fill="currentColor"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/></svg>
      </span>
    </div>

    <div class="body">

      <!-- floating decoration -->
      <div class="float sticky">D-43<br/>加油!</div>
      <div class="float book"></div>
      <div class="float dot d1"></div>
      <div class="float dot d2"></div>

      <!-- hero -->
      <div class="hero">
        <div class="logo">学</div>
        <h1 class="title">学不死</h1>
        <p class="subtitle">和你一起, 把<span class="accent">那场考试</span>慢慢啃下来</p>
      </div>

      <!-- illustration -->
      <div class="scene">
        <div class="item pencil"></div>
        <div class="item book2"></div>
        <div class="item cup"></div>
        <div class="desk"></div>
      </div>

      <!-- form -->
      <div class="form">
        <div class="field">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>
            </svg>
          </span>
          <input type="text" placeholder="账号 / 邮箱"/>
        </div>
        <div class="field">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="11" width="16" height="10" rx="2"/>
              <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
            </svg>
          </span>
          <input type="password" placeholder="密码" value="••••••••"/>
          <button class="eye" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="form-row">
          <label class="remember">
            <span class="check checked"></span>
            记住我
          </label>
          <a href="#" class="link-text">忘记密码?</a>
        </div>
      </div>

      <!-- buttons -->
      <div class="actions">
        <button class="btn btn-primary">登录</button>
        <div class="signup">
          还没有账号? <a href="#">去注册 →</a>
        </div>
      </div>

      <!-- footer -->
      <div class="footer">
        登录即同意 <a href="#">《用户协议》</a> 与 <a href="#">《隐私政策》</a>
      </div>

    </div>

    <div class="home-indicator"></div>
  </div>
</div>

</body>
</html>
